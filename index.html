<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta author="Muhammed Esmail">
    
    <title>Cute Calculator</title>

    <link rel="stylesheet" href="style/main.css">
</head>
<body>

    <div id="calc">
        <div id="screen">
            <div id="output">
            </div>
        </div>

        <div id="input">
            <input onclick="clicked(value)" type="button" class="btn sp" id="clear" value="C">
            <input onclick="clicked(value)" type="button" class="btn sp" id="del" value="DEL">
            <input onclick="clicked(value)" type="button" class="btn" id="modulo" value="%">
            <input onclick="clicked(value)" type="button" class="btn op" id="divide" value="/">

            <input onclick="clicked(value)" type="button" class="btn" id="btn_7" value="7">
            <input onclick="clicked(value)" type="button" class="btn" id="btn_8" value="8">
            <input onclick="clicked(value)" type="button" class="btn" id="btn_9" value="9">
            <input onclick="clicked(value)" type="button" class="btn op" id="multiply" value="*">

            <input onclick="clicked(value)" type="button" class="btn" id="btn_4" value="4">
            <input onclick="clicked(value)" type="button" class="btn" id="btn_5" value="5">
            <input onclick="clicked(value)" type="button" class="btn" id="btn_6" value="6">
            <input onclick="clicked(value)" type="button" class="btn op" id="minus" value="-">

            <input onclick="clicked(value)" type="button" class="btn" id="btn_1" value="1">
            <input onclick="clicked(value)" type="button" class="btn" id="btn_2" value="2">
            <input onclick="clicked(value)" type="button" class="btn" id="btn_3" value="3">
            <input onclick="clicked(value)" type="button" class="btn op" id="add" value="+">

            <input onclick="clicked(value)" type="button" class="btn" id="btn_0" value="0">
            <input onclick="clicked(value)" type="button" class="btn" id="point" value=".">
            <input onclick="clicked(value)" type="button" class="btn" id="equal" value="=">
            
        </div>
        
    </div>

    <script src="scripts/script.js"></script>
</body>
</html>
